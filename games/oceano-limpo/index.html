<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oceano Limpo | EcoPlanet</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #29b6f6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', Arial, sans-serif;
        }

        canvas { display: block; }

        #btn-hub {
            position: fixed;
            top: 12px; left: 12px;
            z-index: 9999;
            background: #fff;
            border: none;
            color: #1565c0;
            font-family: 'Nunito', Arial, sans-serif;
            font-size: 13px; font-weight: 800;
            padding: 7px 16px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #00000020;
            display: flex; align-items: center; gap: 6px;
            user-select: none;
            transition: transform 0.1s;
        }
        #btn-hub:hover { transform: translateY(-1px); }

        /* ── Auth gate ── */
        #auth-gate {
            position: fixed;
            inset: 0;
            background: rgba(0, 20, 60, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }

        .gate-card {
            background: #fff;
            border: 2px solid #90caf9;
            border-radius: 24px;
            padding: 40px 44px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 0 #1565c055, 0 14px 40px #00000030;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .gate-icon {
            width: 68px; height: 68px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1565c0, #29b6f6);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #0d47a1;
        }
        .gate-icon i { color: #fff; font-size: 30px; }

        .gate-title {
            font-size: 22px; font-weight: 900;
            color: #1565c0;
        }

        .gate-sub {
            font-size: 14px; font-weight: 700;
            color: #1976d2;
            line-height: 1.6;
        }

        .gate-btn {
            background: linear-gradient(180deg, #29b6f6, #1565c0);
            border: none;
            border-radius: 50px;
            padding: 12px 32px;
            font-family: 'Nunito', Arial, sans-serif;
            font-size: 15px; font-weight: 900;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 5px 0 #0d47a1;
            letter-spacing: 0.5px;
            transition: transform 0.1s;
        }
        .gate-btn:hover  { transform: translateY(-2px); }
        .gate-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0d47a1; }
    </style>
</head>
<body>

    <div id="btn-hub" onclick="window.location.href='../../index.html'">
        <i class="fa-solid fa-arrow-left"></i> EcoPlanet
    </div>

    <div id="auth-gate">
        <div class="gate-card">
            <div class="gate-icon"><i class="fa-solid fa-lock"></i></div>
            <div class="gate-title">Login necessário!</div>
            <div class="gate-sub">Você precisa estar logado<br>para jogar. Crie sua conta gratuita!</div>
            <button class="gate-btn" onclick="window.location.href='../../index.html'">
                <i class="fa-solid fa-right-to-bracket"></i>&nbsp; Fazer Login
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../../auth/supabase.js"></script>
    <script>
        (function () {
            if (!window._supabase) {
                document.getElementById('auth-gate').style.display = 'none';
                return;
            }
            window._supabase.auth.getSession().then(function (result) {
                if (result.data && result.data.session) {
                    document.getElementById('auth-gate').style.display = 'none';
                }
            }).catch(function () {
                document.getElementById('auth-gate').style.display = 'none';
            });
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/MenuScene.js"></script>
    <script src="src/scenes/GameScene.js"></script>
    <script src="src/scenes/EndScene.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
